<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentApp - 教育管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        .header { background: #1890ff; color: white; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 20px; }
        .btn { background: white; color: #1890ff; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: 500; }
        .container { max-width: 900px; margin: 20px auto; padding: 0 20px; }
        .card { background: white; border-radius: 8px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .section-title { font-size: 16px; color: #333; margin-bottom: 12px; padding-bottom: 8px; border-bottom: #f0f0f0; }
        .student-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
        .student-card { background: #fafafa; border: 1px solid #e8e8e8; border-radius: 6px; padding: 12px; cursor: pointer; transition: all 0.2s; }
        .student-card:hover { border-color: #1890ff; background: #e6f7ff; }
        .student-card h3 { color: #333; font-size: 15px; margin-bottom: 4px; }
        .student-card p { color: #666; font-size: 13px; }
        .btn-add { background: #1890ff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; font-size: 14px; color: #666; }
        .form-group input { width: 100%; padding: 8px 12px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 14px; }
        .form-row { display: flex; gap: 12px; }
        .form-row .form-group { flex: 1; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal.show { display: flex; }
        .modal-content { background: white; border-radius: 8px; padding: 24px; width: 90%; max-width: 420px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .modal-header h2 { font-size: 16px; }
        .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: #999; }
        .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
        .btn-secondary { background: #f5f5f5; color: #666; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .empty { text-align: center; padding: 40px; color: #999; }
        .back-link { color: #1890ff; cursor: pointer; font-size: 14px; }
        .info-row { display: flex; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
        .info-row:last-child { border: none; }
        .info-label { width: 80px; color: #999; font-size: 13px; }
        .info-value { flex: 1; color: #333; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎓 StudentApp</h1>
        <button class="btn" onclick="showAddModal()">+ 添加学生</button>
    </div>
    
    <div class="container">
        <!-- 学生列表 -->
        <div class="card" id="listView">
            <div class="section-title">学生列表 (<span id="studentCount">0</span>人)</div>
            <div class="student-list" id="studentList">
                <div class="empty">加载中...</div>
            </div>
        </div>
        
        <!-- 学生详情 -->
        <div class="card" id="detailView" style="display:none;">
            <div class="back-link" onclick="showList()">← 返回列表</div>
            <div style="margin-top:12px;" id="studentDetail"></div>
        </div>
    </div>
    
    <!-- 添加弹窗 -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>添加学生</h2>
                <button class="modal-close" onclick="hideAddModal()">×</button>
            </div>
            <div class="form-group">
                <label>姓名</label>
                <input type="text" id="studentName" placeholder="请输入学生姓名">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>年龄</label>
                    <input type="number" id="studentAge" placeholder="年龄" value="10">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="hideAddModal()">取消</button>
                <button class="btn-add" onclick="addStudent()">保存</button>
            </div>
        </div>
    </div>
    
    <script>
        const API = 'http://localhost:3000/api';
        
        function loadStudents() {
            fetch(API + '/students').then(r => r.json()).then(data => {
                document.getElementById('studentCount').textContent = data.length;
                if (data.length === 0) {
                    document.getElementById('studentList').innerHTML = '<div class="empty">暂无学生，点击右上角添加</div>';
                    return;
                }
                document.getElementById('studentList').innerHTML = data.map(s => 
                    '<div class="student-card" onclick="viewStudent(\'' + s.id + '\')"><h3>' + s.name + '</h3><p>年龄: ' + s.age + '岁</p></div>'
                ).join('');
            });
        }
        
        function viewStudent(id) {
            document.getElementById('listView').style.display = 'none';
            document.getElementById('detailView').style.display = 'block';
            document.getElementById('detailView').innerHTML = '<div class="back-link" onclick="showList()">← 返回列表</div><div style="margin-top:12px;"><h2>学生ID: ' + id + '</h2><p style="color:#999;margin-top:8px;">详情功能开发中...</p></div>';
        }
        
        function showList() {
            document.getElementById('listView').style.display = 'block';
            document.getElementById('detailView').style.display = 'none';
        }
        
        function showAddModal() { document.getElementById('addModal').classList.add('show'); }
        function hideAddModal() { document.getElementById('addModal').classList.remove('show'); document.getElementById('studentName').value = ''; }
        
        function addStudent() {
            var name = document.getElementById('studentName').value.trim();
            var age = parseInt(document.getElementById('studentAge').value) || 10;
            if (!name) return alert('请输入姓名');
            
            fetch(API + '/students', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, age })
            }).then(r => r.json()).then(d => {
                if (d.success) { hideAddModal(); loadStudents(); }
                else alert('添加失败');
            });
        }
        
        loadStudents();
    </script>
</body>
</html>
